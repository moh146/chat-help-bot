<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ZaxaR AI PRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="container">
        <header>
            <span>ZAXAR AI PRO</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="modelSelect">
                    <option value="gpt-4o-mini" selected>GPT-4o Mini</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4.1">GPT-4.1</option>
                    <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                    <option value="gpt-4.1-nano">GPT-4.1 Nano</option>
                </select>
                <button id="clearBtn" style="background:transparent; color:#000; border:none; cursor:pointer; font-size:1.2rem;">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </header>

        <div id="chat"></div>

        <div id="controls">
            <div id="imagePreviewContainer">
                <div id="removeImageBtn">&times;</div>
            </div>
            <input type="file" id="imageInput" style="display:none;" accept="image/*">
            <button id="uploadBtn" class="btn-icon"><i class="fas fa-camera"></i></button>
            <textarea id="entry" placeholder="Write something..." rows="1"></textarea>
            <button id="mainBtn" class="btn-icon"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.1/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
